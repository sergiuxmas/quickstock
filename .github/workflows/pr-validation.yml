name: PR Validation

on:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr:
    name: Build, test, start containers, and validate login
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build, run tests, and enforce JaCoCo coverage on both modules
        run: mvn -B -ntp clean verify

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-reports-pr-${{ github.event.pull_request.number }}
          if-no-files-found: warn
          path: |
            quickstock-core-service/target/site/jacoco/
            payments-service/target/site/jacoco/

#      - name: Set up Docker Buildx
#        uses: docker/setup-buildx-action@v4

      - name: Start application containers
        run: docker compose up -d --build

      - name: Wait for login endpoint and verify token
        shell: bash
        run: |
          set -euo pipefail

          LOGIN_URL="http://localhost:8081/auth/login"
          PAYLOAD='{"username":"admin","password":"admin"}'

          echo "Waiting for application to become ready..."

          for i in {1..30}; do
            response=$(curl -sS -m 10 \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$LOGIN_URL" || true)

            if echo "$response" | grep -q "token"; then
              echo "Health check passed. Response contains token."
              exit 0
            fi

            echo "Attempt $i/30: endpoint not ready yet"
            sleep 10
          done

          echo "Health check failed. Response did not contain token."
          echo "Last response:"
          echo "$response"
          echo
          echo "Container status:"
          docker compose ps
          echo
          echo "Container logs:"
          docker compose logs --no-color
          exit 1

      - name: Stop containers
        if: always()
        run: docker compose down -v

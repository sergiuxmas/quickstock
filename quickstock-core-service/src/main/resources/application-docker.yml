server:
  port: 8081

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
    org.springframework.boot.flyway.autoconfigure: DEBUG

spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://core-db:5432/quickstock_core
  flyway:
    enabled: true
    url: jdbc:postgresql://core-db:5432/quickstock_core
    user: quickstock
    password: secret
    locations: classpath:db/migration

payments:
  base-url: http://payments-service:8082

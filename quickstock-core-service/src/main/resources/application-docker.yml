server:
  port: 8081

logging:
  level:
    org.flywaydb: INFO
    org.springframework.boot.autoconfigure.flyway: DEBUG

spring:
  datasource:
    url: jdbc:postgresql://core-db:5432/quickstock_core
    username: quickstock
    password: secret
  flyway:
    enabled: true
    locations: classpath:db/migration

payments:
  base-url: http://payments-service:8082
